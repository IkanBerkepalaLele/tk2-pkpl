<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        /* CSS Variables untuk Light Mode (Default) */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
        }

        /* CSS Variables untuk Dark Mode */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
        }

        /* Terapkan variabel ke elemen body */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s; /* Efek transisi halus */
            font-family: sans-serif;
            padding: 20px;
        }

        /* Sembunyikan tombol tema secara default */
        #themeToggleBtn {
            display: none; 
            margin-top: 20px;
            padding: 10px 15px;
            cursor: pointer;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Selamat datang, <span id="userName">Loading...</span></h1>
    <p id="roleInfo"></p>
    <a href="/logout" style="color: red;">Logout</a>
    <br>
    
    <button id="themeToggleBtn">Ubah Tema (Dark/Light)</button>

    <script>
        const userNameEl = document.getElementById('userName');
        const roleInfoEl = document.getElementById('roleInfo');
        const themeBtn = document.getElementById('themeToggleBtn');

        function applyTheme(mode) {
            document.body.classList.toggle('dark-mode', mode === 'dark');
        }

        async function getJson(url, options) {
            const response = await fetch(url, options);

            if (response.status === 401) {
                window.location.href = '/index.html';
                throw new Error('Unauthorized');
            }

            if (!response.ok) {
                throw new Error('Request failed: ' + response.status);
            }

            return response.json();
        }

        async function initDashboard() {
            try {
                const user = await getJson('/api/user');
                userNameEl.innerText = user.name || 'User';

                const theme = await getJson('/api/theme');
                applyTheme(theme.mode);

                if (user.canChangeTheme) {
                    roleInfoEl.innerText = 'Role: Editor (boleh ubah tampilan)';
                    themeBtn.style.display = 'inline-block';

                    themeBtn.addEventListener('click', async () => {
                        const nextMode = document.body.classList.contains('dark-mode') ? 'light' : 'dark';

                        try {
                            const result = await getJson('/api/theme', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ mode: nextMode })
                            });

                            applyTheme(result.theme.mode);
                        } catch (error) {
                            console.error('Gagal mengubah tema:', error);
                        }
                    });
                } else {
                    roleInfoEl.innerText = 'Role: Read-only (hanya melihat)';
                }
            } catch (error) {
                console.error('Gagal memuat dashboard:', error);
                userNameEl.innerText = 'Gagal memuat nama';
                roleInfoEl.innerText = 'Silakan login ulang.';
            }
        }

        initDashboard();
    </script>
</body>
</html>
